name: Docker Control Plane Images (Manual Only)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit image tag (latest is forbidden)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-control-plane-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Reject mutable tag
        run: |
          test "${{ inputs.version }}" != "latest"
          printf '%s' "${{ inputs.version }}" | grep -Eq '^[A-Za-z0-9._-]{1,64}$'
      - name: Validate secure stack
        working-directory: veiron-release/vps-control-plane
        run: ./scripts/validate-stack.sh --require-docker

  build:
    needs: validate
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: veiron-runtime
            context: .
            dockerfile: veiron-release/vps-control-plane/docker/Dockerfile
          - image: veiron-ops
            context: veiron-release/vps-control-plane
            dockerfile: veiron-release/vps-control-plane/docker/ops/Dockerfile
          - image: veiron-backup-scheduler
            context: veiron-release/vps-control-plane
            dockerfile: veiron-release/vps-control-plane/docker/backup-scheduler/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ inputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true
