bind_host = "127.0.0.1"
bind_port = 10787
network = "mainnet-candidate"
network_id = "veiron-mainnet-candidate"
human_name = "Vireon Mainnet Candidate"
status_label = "Planned / Mainnet Candidate"
address_prefix = "vire"
chain_data_path = "/var/lib/vireon/.vireon-mainnet/chain"
indexer_data_path = "/var/lib/vireon/.vireon-mainnet/indexer"
mempool_data_path = "/var/lib/vireon/.vireon-mainnet/mempool"
public_rpc_allowed = false
access_mode = "public-submit"
# Required for solo miners (desktop/CLI) and the local pool upstream.
# Public HTTPS never exposes mining routes; the optional pool uses a separate private RPC.
# Without this flag, public-submit no longer registers mining routes (gateway default).
expose_mining_endpoints = true
max_mempool_transactions = 4096
max_request_body_bytes = 65536
cors_allowed_origin = "__PUBLIC_ORIGIN__"
cors_allowed_origins = ["__PUBLIC_ORIGIN__", "http://127.0.0.1:4173", "http://localhost:4173", "http://127.0.0.1:5173", "http://localhost:5173"]
allow_mainnet_candidate = true
