global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: vireon-network
    environment: mainnet-candidate

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]


  - job_name: vireon-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://vireon-rpc:10787/health
          - http://vireon-rpc:10787/status
          - http://vireon-rpc:10787/indexer/status
          - http://vireon-control:10788/health
          - http://vireon-ops:8080/health
          - http://grafana:3000/api/health
          - http://loki:3100/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
