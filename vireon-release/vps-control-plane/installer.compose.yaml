name: vireon-installer
services:
  docker-broker:
    image: ${VIREON_OPS_IMAGE:-ghcr.io/andreidohot/vireon-ops}:${VIREON_VERSION:-2.1.0-no-autoupdate}
    build:
      context: ${VIREON_HOST_WORKSPACE:?Set VIREON_HOST_WORKSPACE}
      dockerfile: docker/ops/Dockerfile
    container_name: vireon-installer-broker
    restart: unless-stopped
    working_dir: ${VIREON_HOST_WORKSPACE}
    environment:
      VIREON_WORKSPACE: ${VIREON_HOST_WORKSPACE}
      VIREON_COMPOSE_FILE: ${VIREON_HOST_WORKSPACE}/compose.yaml
      VIREON_HOST_WORKSPACE: ${VIREON_HOST_WORKSPACE}
      VIREON_HOST_REPO: ${VIREON_HOST_REPO}
      BROKER_TOKEN_FILE: /run/secrets/broker_token
      VIREON_INSTALLER_MODE: "true"
    command: ["gunicorn", "--bind", "0.0.0.0:8090", "--workers", "1", "--threads", "2", "--timeout", "7200", "broker:app"]
    volumes:
      - ${VIREON_HOST_WORKSPACE}:${VIREON_HOST_WORKSPACE}
      - ${VIREON_HOST_REPO}:${VIREON_HOST_REPO}:ro
      - /var/run/docker.sock:/var/run/docker.sock
    secrets: [broker_token, cloudflare_api_token, backup_passphrase, r2_secret_access_key]
    networks: [installer-internal]
    read_only: true
    tmpfs: [/tmp:size=256m,mode=1777]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 12
  vireon-installer:
    image: ${VIREON_OPS_IMAGE:-ghcr.io/andreidohot/vireon-ops}:${VIREON_VERSION:-2.1.0-no-autoupdate}
    build:
      context: ${VIREON_HOST_WORKSPACE:?Set VIREON_HOST_WORKSPACE}
      dockerfile: docker/ops/Dockerfile
    container_name: vireon-installer
    restart: unless-stopped
    environment:
      VIREON_WORKSPACE: /workspace
      SETUP_TOKEN_FILE: /run/secrets/setup_token
      BROKER_URL: http://docker-broker:8090
      BROKER_TOKEN_FILE: /run/secrets/broker_token
      VIREON_HOST_WORKSPACE: ${VIREON_HOST_WORKSPACE}
      VIREON_HOST_REPO: ${VIREON_HOST_REPO}
    ports: ["127.0.0.1:${OPS_BOOTSTRAP_PORT:-8080}:8080"]
    volumes: ["${VIREON_HOST_WORKSPACE}:/workspace"]
    secrets: [setup_token, broker_token]
    depends_on:
      docker-broker: {condition: service_healthy}
    networks: [installer-internal]
    read_only: true
    tmpfs: [/tmp:size=128m,mode=1777]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
networks:
  installer-internal: {name: vireon-installer-internal, driver: bridge}
secrets:
  setup_token: {file: ./state/secrets/setup_token}
  broker_token: {file: ./state/secrets/broker_token}
  cloudflare_api_token: {file: ./state/secrets/cloudflare_api_token}
  backup_passphrase: {file: ./state/secrets/backup_passphrase}
  r2_secret_access_key: {file: ./state/secrets/r2_secret_access_key}
