name: vireon-node
arch: x86_64
platform: linux
version: ${VIREON_NODE_VERSION}
maintainer: Vireon Network <admin@vireon.network>
description: Vireon Mainnet Candidate full validation node
homepage: https://github.com/andreidohot/vireon-network
license: Apache-2.0
contents:
  - src: release-artifacts/nfpm-stage/vireon-node
    dst: /usr/bin/vireon-node
  - src: configs/genesis.mainnet-candidate.toml
    dst: /usr/share/vireon/configs/genesis.mainnet-candidate.toml
  - src: docs/release/GENESIS_APPROVAL.mainnet-candidate.json
    dst: /usr/share/vireon/docs/release/GENESIS_APPROVAL.mainnet-candidate.json
  - src: vireon-release/vps/configs/node.vps.toml
    dst: /usr/share/vireon/node.example.toml
