name: Android Client CI

on:
  push:
    branches: [main]
    paths:
      - "vireon-android/**"
      - "vireon-mobile-core/**"
      - "vireon-core/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "vireon-android/**"
      - "vireon-mobile-core/**"
      - "vireon-core/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-debug:
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build and verify Android debug APK
        working-directory: vireon-android
        shell: powershell
        run: .\gradlew.bat --no-daemon clean testDebugUnitTest lintDebug assembleDebugAndroidTest assembleDebug verifyDebugNativeLibraries

      - name: Upload Android debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vireon-android-debug
          if-no-files-found: error
          path: vireon-android/app/build/outputs/apk/debug/*.apk
