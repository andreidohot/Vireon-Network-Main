name: VPS Control Plane Release

on:
  push:
    tags:
      - "vps-control-v*-rc.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing VPS control-plane tag to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: vps-control-plane-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify-build-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy,rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Verify requested tag
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < vireon-release/vps-control-plane/VERSION)"
          case "$RELEASE_TAG" in
            "vps-control-v${VERSION}-rc."*) ;;
            *) echo "Tag $RELEASE_TAG does not match VERSION $VERSION" >&2; exit 1 ;;
          esac

      - name: Repository security checks
        run: |
          bash scripts/git/check-forbidden-files.sh
          bash scripts/security/check-secrets.sh
          bash scripts/security/check-repo-hygiene.sh
          bash scripts/security/check-config-safety.sh

      - name: Rust release checks
        run: |
          cargo fmt --all --check
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Validate Docker control plane
        working-directory: vireon-release/vps-control-plane
        run: ./scripts/validate-stack.sh --require-docker

      - name: Build VPS control-plane bundle
        run: bash scripts/release/build-vps-control-plane-bundle.sh

      - name: Verify bundle contents and checksum
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum --check vireon-docker-control-plane.tar.gz.sha256
          tar -tzf vireon-docker-control-plane.tar.gz > vps-control-contents.txt
          for required in \
            Cargo.toml \
            Cargo.lock \
            vireon-release/vps-control-plane/compose.yaml \
            vireon-release/vps-control-plane/installer.compose.yaml \
            vireon-release/vps-control-plane/docker/Dockerfile \
            vireon-release/vps-control-plane/scripts/install-docker-stack.sh; do
            grep -Fxq "$required" vps-control-contents.txt || {
              echo "Missing required bundle entry: $required" >&2
              exit 1
            }
          done

      - name: Publish VPS control-plane prerelease
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Vireon VPS Control Plane ${{ env.RELEASE_TAG }}
          prerelease: true
          draft: false
          generate_release_notes: true
          body: |
            Mainnet Candidate VPS control-plane prerelease for operator testing.

            This is not a Mainnet Live declaration. Verify the SHA-256 file before installation. The optional mining-pool coordinator remains a prototype and does not store payout signing keys.
          files: |
            release-artifacts/vireon-docker-control-plane.tar.gz
            release-artifacts/vireon-docker-control-plane.tar.gz.sha256
            release-artifacts/vps-control-contents.txt
          fail_on_unmatched_files: true
