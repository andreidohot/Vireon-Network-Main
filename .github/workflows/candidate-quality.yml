name: Candidate Quality Checks

on:
  push:
    tags:
      - "v*-candidate.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing candidate tag, for example v1.0.0-candidate.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: candidate-quality-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Rust workspace quality checks
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout candidate tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run workspace tests
        run: cargo test --workspace --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
